name: Mobile Appium E2E Tests (Android)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up JDK ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Set up Node.js ──────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Build Debug APK ─────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          echo "APK_PATH=$(find . -name '*.apk' -path '*/debug/*' | head -1)" >> $GITHUB_ENV

      # ── 5. Enable KVM ──────────────────────────────────────────────
      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      # ── 6. Install Appium Dependencies ─────────────────────────────
      - name: Install Appium & WDIO Dependencies
        working-directory: BrainBattleAppium
        run: |
          npm install
          npx appium driver install uiautomator2 || true

      # ── 7. Boot Emulator & Run Tests ───────────────────────────────
      - name: Run Appium Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          profile: Nexus 6
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            export APK_PATH="${{ github.workspace }}/android/${{ env.APK_PATH }}"
            cd BrainBattleAppium
            chmod +x scripts/ci_run_tests.sh
            bash scripts/ci_run_tests.sh

      # ── 8. Upload Excel Report ─────────────────────────────────────
      - name: Upload Appium Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Test-Report-XLSX
          path: BrainBattleAppium/reports/*.xlsx
          retention-days: 30

      # ── 9. Upload HTML Report ──────────────────────────────────────
      - name: Upload Appium HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Test-Report-HTML
          path: BrainBattleAppium/reports/execution-report.html
          retention-days: 30

      # ── 10. Deploy Reports to GitHub Pages ─────────────────────────
      - name: Deploy Reports to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: BrainBattleAppium/reports
          target-folder: reports/latest
          branch: gh-pages
          clean: false

      - name: Deploy Historical Report
        if: always() && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: BrainBattleAppium/reports
          target-folder: reports/history/build-${{ github.run_number }}
          branch: gh-pages
          clean: false

      # ── 11. Print Summary ──────────────────────────────────────────
      - name: Print Test Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  📱 BrainBattle Appium E2E — Run Complete"
          echo "═══════════════════════════════════════════════════════"
          if [ -f BrainBattleAppium/reports/execution-report.html ]; then
            echo "  ✅ HTML report generated"
          else
            echo "  ⚠️  No HTML report found"
          fi
          ls -la BrainBattleAppium/reports/ 2>/dev/null || echo "  No reports directory found."
          echo "═══════════════════════════════════════════════════════"
